<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>Флеш-картки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="subjectSelection" class="subject-selection">
        <h1>Оберіть предмет</h1>
        <div class="subject-grid">
            <button class="subject-card" data-subject="history">
                <span class="subject-icon">🏛️</span>
                <span class="subject-name">Історія України</span>
            </button>
            <button class="subject-card" data-subject="english">
                <span class="subject-icon">🇬🇧</span>
                <span class="subject-name">Англійська мова</span>
            </button>
        </div>
    </div>

    <div id="appContent" style="display: none;">
        <header>
            <div class="header-left">
                <button id="backBtn" class="icon-btn" title="На головну">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <h1 id="appTitle">Флеш-картки</h1>
            </div>
            <div class="controls">
                <select id="topicFilter">
                    <option value="all">Всі теми</option>
                </select>
                <select id="typeFilter">
                    <option value="all">Всі типи</option>
                </select>
                <select id="importanceFilter">
                    <option value="mandatory">Обов'язкові</option>
                    <option value="all">Всі</option>
                </select>
                <select id="modeFilter">
                    <option value="direct">Прямий (Пит. → Відп.)</option>
                    <option value="reverse">Зворотний (Відп. → Пит.)</option>
                    <option value="test">Тест</option>
                </select>
                <button id="startBtn" class="primary">Почати сесію</button>
                <button id="resetBtn">Скинути</button>
            </div>
        </header>

        <main>
            <div class="stats" id="stats" style="display: none;">
                <div class="stat">
                    <div class="stat-value" id="statTotal">0</div>
                    <div>Всього</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statNew">0</div>
                    <div>Нові</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statLearning">0</div>
                    <div>Вчимо</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statMastered">0</div>
                    <div>Вивчені</div>
                </div>
            </div>

            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="card-container" id="cardContainer" style="display: none;">
                <div class="card" id="card">
                    <div class="card-face card-front">
                        <div class="card-type" id="cardType"></div>
                        <div class="card-badge" id="cardBadge" style="display: none;">Дод.</div>
                        <div class="card-content" id="cardQuestion"></div>
                        <div class="card-options" id="cardOptions" style="display: none;"></div>
                        <div class="card-hint" id="cardHint">Клікніть або натисніть Пробіл, щоб відкрити</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-type" id="cardTypeBack"></div>
                        <div class="card-badge" id="cardBadgeBack" style="display: none;">Дод.</div>
                        <div class="card-content" id="cardAnswer"></div>
                        <div class="card-hint">Оцініть пам'ять</div>
                    </div>
                </div>
            </div>

            <div class="rating-buttons" id="ratingButtons">
                <button class="rating-btn btn-again" data-rating="again">Знову (1)</button>
                <button class="rating-btn btn-hard" data-rating="hard">Важко (2)</button>
                <button class="rating-btn btn-good" data-rating="good">Добре (3)</button>
                <button class="rating-btn btn-easy" data-rating="easy">Легко (4)</button>
            </div>

            <div class="empty-state" id="emptyState">
                <p>Оберіть фільтри, режим та натисніть "Почати сесію"</p>
            </div>

            <div class="keyboard-hints" id="kbdHints">
                <p><kbd>Space</kbd> перевернути &nbsp; <kbd>1</kbd>-<kbd>4</kbd> оцінити &nbsp; <kbd>Esc</kbd> завершити</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
