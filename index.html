<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Флеш-картки: Історія України</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Флеш-картки</h1>
        <div class="controls">
            <select id="topicFilter">
                <option value="all">Всі теми</option>
            </select>
            <select id="typeFilter">
                <option value="all">Всі типи</option>
                <option value="date">Дати</option>
                <option value="term">Терміни</option>
                <option value="person">Постаті</option>
            </select>
            <select id="importanceFilter">
                <option value="mandatory">Тільки обов'язкові</option>
                <option value="all">Всі (з додатковими)</option>
            </select>
            <select id="modeFilter">
                <option value="direct">Прямий (Пит. → Відп.)</option>
                <option value="reverse">Зворотний (Відп. → Пит.)</option>
                <option value="test">Тест (НМТ)</option>
            </select>
            <button id="startBtn" class="primary">Почати сесію</button>
            <button id="resetBtn">Скинути прогрес</button>
        </div>
    </header>

    <main>
        <div class="stats" id="stats" style="display: none;">
            <div class="stat">
                <div class="stat-value" id="statTotal">0</div>
                <div>Всього</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statNew">0</div>
                <div>Нові</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statLearning">0</div>
                <div>Вивчаються</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statMastered">0</div>
                <div>Вивчені</div>
            </div>
        </div>

        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="card-container" id="cardContainer" style="display: none;">
            <div class="card" id="card">
                <div class="card-face card-front">
                    <div class="card-type" id="cardType"></div>
                    <div class="card-badge" id="cardBadge" style="display: none;">Додаткова</div>
                    <div class="card-content" id="cardQuestion"></div>
                    <div class="card-options" id="cardOptions" style="display: none;"></div>
                    <div class="card-hint" id="cardHint">Клікніть або натисніть Пробіл, щоб відкрити</div>
                </div>
                <div class="card-face card-back">
                    <div class="card-type" id="cardTypeBack"></div>
                    <div class="card-badge" id="cardBadgeBack" style="display: none;">Додаткова</div>
                    <div class="card-content" id="cardAnswer"></div>
                    <div class="card-hint">Оцініть пам'ять</div>
                </div>
            </div>
        </div>

        <div class="rating-buttons" id="ratingButtons">
            <button class="rating-btn btn-again" data-rating="again">Знову (1)</button>
            <button class="rating-btn btn-hard" data-rating="hard">Важко (2)</button>
            <button class="rating-btn btn-good" data-rating="good">Добре (3)</button>
            <button class="rating-btn btn-easy" data-rating="easy">Легко (4)</button>
        </div>

        <div class="empty-state" id="emptyState">
            <p>Оберіть фільтри, режим та натисніть "Почати сесію"</p>
        </div>

        <div class="keyboard-hints" id="kbdHints">
            <p><kbd>Space</kbd> перевернути &nbsp; <kbd>1</kbd>-<kbd>4</kbd> оцінити &nbsp; <kbd>Esc</kbd> завершити</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
